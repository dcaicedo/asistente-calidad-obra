<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Asistente de Calidad — Obra</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap');

:root {
  --green:     #1A6B47;
  --green-l:   #E8F3EE;
  --green-m:   #C0DDD0;
  --red:       #C0392B;
  --red-l:     #FDF1F0;
  --amber:     #B45309;
  --amber-l:   #FEF3C7;
  --gray-900:  #111827;
  --gray-600:  #4B5563;
  --gray-400:  #9CA3AF;
  --gray-100:  #F3F4F6;
  --gray-50:   #F9FAFB;
  --white:     #FFFFFF;
  --radius:    12px;
  --font-body: 'DM Sans', sans-serif;
  --font-disp: 'DM Serif Display', serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--font-body);
  background: var(--gray-50);
  color: var(--gray-900);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ───────────────────────────────────────────── */
.header {
  background: var(--white);
  border-bottom: 1px solid #E5E7EB;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.logo {
  width: 36px; height: 36px;
  background: var(--green);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo svg { width: 20px; height: 20px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.header-text h1 { font-family: var(--font-disp); font-size: 17px; font-weight: 400; line-height: 1.2; }
.header-text p { font-size: 12px; color: var(--gray-400); }
.offline-badge {
  margin-left: auto;
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 500;
  color: var(--green);
  background: var(--green-l);
  padding: 4px 10px;
  border-radius: 20px;
  flex-shrink: 0;
}
.offline-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; }

/* ── MAIN ────────────────────────────────────────────── */
.main { flex: 1; max-width: 640px; width: 100%; margin: 0 auto; padding: 20px 16px 100px; }

/* ── SEARCH BOX ──────────────────────────────────────── */
.search-wrap {
  background: var(--white);
  border: 1.5px solid #E5E7EB;
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .15s;
  margin-bottom: 16px;
}
.search-wrap:focus-within { border-color: var(--green); }
.search-inner { display: flex; align-items: flex-end; gap: 0; }
.search-icon {
  padding: 12px 12px 12px 14px;
  color: var(--gray-400);
  flex-shrink: 0;
  align-self: center;
}
.search-icon svg { width: 18px; height: 18px; display: block; }
textarea#query {
  flex: 1;
  border: none;
  outline: none;
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.5;
  color: var(--gray-900);
  background: transparent;
  resize: none;
  padding: 12px 0;
  min-height: 48px;
  max-height: 140px;
}
textarea#query::placeholder { color: var(--gray-400); }
.search-btn {
  margin: 8px;
  width: 40px; height: 40px;
  background: var(--green);
  border: none;
  border-radius: 9px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity .15s, transform .1s;
}
.search-btn:hover { opacity: .88; }
.search-btn:active { transform: scale(.95); }
.search-btn:disabled { opacity: .35; cursor: default; }
.search-btn svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── CHIPS ───────────────────────────────────────────── */
.chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 24px; }
.chip {
  padding: 6px 13px;
  border-radius: 20px;
  border: 1px solid #E5E7EB;
  background: var(--white);
  font-family: var(--font-body);
  font-size: 12.5px;
  color: var(--gray-600);
  cursor: pointer;
  transition: all .12s;
  line-height: 1.3;
}
.chip:hover { border-color: var(--green-m); background: var(--green-l); color: var(--green); }

/* ── RESULTS AREA ────────────────────────────────────── */
.results { display: flex; flex-direction: column; gap: 12px; }

/* ── ESTADO VACÍO ────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--gray-400);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; line-height: 1; }
.empty p { font-size: 14px; line-height: 1.6; }
.empty strong { color: var(--gray-600); font-weight: 500; }

/* ── RESULT CARD ─────────────────────────────────────── */
.result-card {
  background: var(--white);
  border: 1px solid #E5E7EB;
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp .2s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.result-card:nth-child(2) { animation-delay: .05s; }
.result-card:nth-child(3) { animation-delay: .10s; }
.result-card:nth-child(4) { animation-delay: .15s; }

.card-top {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #F3F4F6;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.score-ring {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  flex-shrink: 0;
}
.score-high  { background: var(--green-l);  color: var(--green); }
.score-mid   { background: var(--amber-l);  color: var(--amber); }
.score-low   { background: var(--gray-100); color: var(--gray-600); }

.card-meta { flex: 1; min-width: 0; }
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
.tag {
  font-size: 10.5px; font-weight: 500;
  padding: 2px 8px;
  border-radius: 20px;
}
.tag-fase  { background: var(--green-l); color: var(--green); }
.tag-part  { background: var(--gray-100); color: var(--gray-600); }
.card-title {
  font-size: 14.5px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--gray-900);
}

/* ── EXPANDABLE BODY ─────────────────────────────────── */
.card-body { display: none; padding: 12px 16px 14px; flex-direction: column; gap: 10px; }
.card-body.open { display: flex; }

.block {
  border-radius: 8px;
  padding: 9px 12px;
}
.block-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 4px;
}
.block-text { font-size: 13.5px; line-height: 1.55; }

.block-prob  { background: var(--red-l);   border-left: 3px solid var(--red); }
.block-prob .block-label  { color: var(--red); }
.block-prob .block-text   { color: #7B241C; }

.block-sol   { background: var(--green-l); border-left: 3px solid var(--green); }
.block-sol .block-label   { color: var(--green); }
.block-sol .block-text    { color: #14532D; }

.block-est   { background: var(--amber-l); border-left: 3px solid var(--amber); }
.block-est .block-label   { color: var(--amber); }
.block-est .block-text    { color: #78350F; }

/* ── TOGGLE BTN ──────────────────────────────────────── */
.toggle-btn {
  width: 100%;
  padding: 9px 16px;
  background: none;
  border: none;
  border-top: 1px solid #F3F4F6;
  font-family: var(--font-body);
  font-size: 12.5px;
  color: var(--green);
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background .12s;
}
.toggle-btn:hover { background: var(--gray-50); }
.toggle-arrow { transition: transform .2s; font-size: 14px; }
.toggle-arrow.open { transform: rotate(180deg); }

/* ── NO RESULTS ──────────────────────────────────────── */
.no-results {
  background: var(--white);
  border: 1px solid #E5E7EB;
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
}
.no-results p { font-size: 14px; color: var(--gray-600); line-height: 1.6; }
.no-results small { font-size: 12px; color: var(--gray-400); display: block; margin-top: 6px; }

/* ── FOOTER STATS ─────────────────────────────────────── */
.stats-bar {
  font-size: 12px;
  color: var(--gray-400);
  margin-bottom: 14px;
  padding: 0 2px;
  min-height: 18px;
}

/* ── DIVIDER LABEL ────────────────────────────────────── */
.section-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--gray-400);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin: 8px 0 10px;
  padding: 0 2px;
}
</style>
</head>

</main>

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function setQ(text) {
  const q = document.getElementById('query');
  q.value = text;
  autoResize(q);
  buscar();
}

function tokenize(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s]/g, ' ')
    .split(/\s+/)
    .filter(t => t.length > 2);
}

function score(item, tokens) {
  let s = 0;
  const fields = [
    item.titulo.toLowerCase(),
    item.concepto.toLowerCase(),
    item.problema.toLowerCase(),
    item.fase.toLowerCase(),
    item.partida.toLowerCase(),
    item.keywords.join(' ').toLowerCase()
  ].join(' ').normalize('NFD').replace(/[\u0300-\u036f]/g, '');

  tokens.forEach(t => {
    if (fields.includes(t)) {
      if (item.keywords.some(k => k.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(t))) s += 3;
      else if (item.titulo.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(t)) s += 2;
      else s += 1;
    }
  });
  return s;
}

function buscar() {
  const q = document.getElementById('query').value.trim();
  const resultsEl = document.getElementById('results');
  const statsEl = document.getElementById('statsbar');

  if (!q) {
    resultsEl.innerHTML = '<div class="empty"><div class="empty-icon">🏗</div><p>Escribe lo que vas a hacer<br>y te muestro <strong>qué estándares aplicar</strong>.</p></div>';
    statsEl.textContent = '';
    return;
  }

  const tokens = tokenize(q);
  if (!tokens.length) return;

  const scored = DB
    .map(item => ({ item, s: score(item, tokens) }))
    .filter(x => x.s > 0)
    .sort((a, b) => b.s - a.s)
    .slice(0, 5);

  statsEl.textContent = scored.length
    ? `${scored.length} estándar${scored.length > 1 ? 'es' : ''} encontrado${scored.length > 1 ? 's' : ''} para "${q}"`
    : '';

  if (!scored.length) {
    resultsEl.innerHTML = `
      <div class="no-results">
        <p>No encontré estándares para <strong>"${q}"</strong>.</p>
        <small>Prueba con otras palabras: ladrillo, encofrado, tubería, acero, concreto...</small>
      </div>`;
    return;
  }

  resultsEl.innerHTML = scored.map(({item, s}, i) => {
    const maxS = scored[0].s;
    const rel = s / maxS;
    const ringClass = rel > .7 ? 'score-high' : rel > .4 ? 'score-mid' : 'score-low';
    const pct = Math.round(rel * 100);

    const hasProblem  = item.problema && item.problema.trim();
    const hasEstandar = item.estandar && item.estandar.trim() && item.estandar !== 'Por implementar';
    const isPending   = item.estandar === 'Por implementar';

    const bodyBlocks = [
      `<div class="block block-sol">
        <div class="block-label">Qué hacer</div>
        <div class="block-text">${item.concepto}</div>
      </div>`,
      hasProblem ? `<div class="block block-prob">
        <div class="block-label">Si no lo haces</div>
        <div class="block-text">${item.problema}</div>
      </div>` : '',
      hasEstandar ? `<div class="block block-est">
        <div class="block-label">Estándar oficial</div>
        <div class="block-text">${item.estandar}</div>
      </div>` : '',
      isPending ? `<div class="block block-est">
        <div class="block-label">Estado</div>
        <div class="block-text">Por implementar — consulta con tu supervisor.</div>
      </div>` : ''
    ].filter(Boolean).join('');

    return `
    <div class="result-card" style="animation-delay:${i*0.05}s">
      <div class="card-top">
        <div class="score-ring ${ringClass}">${pct}%</div>
        <div class="card-meta">
          <div class="card-tags">
            <span class="tag tag-fase">${item.fase}</span>
            <span class="tag tag-part">${item.partida}</span>
          </div>
          <div class="card-title">${item.titulo}</div>
        </div>
      </div>
      <div class="card-body" id="body-${item.id}">${bodyBlocks}</div>
      <button class="toggle-btn" onclick="toggle(${item.id}, this)">
        Ver detalle
        <span class="toggle-arrow" id="arrow-${item.id}">▾</span>
      </button>
    </div>`;
  }).join('');

  if (scored.length === 1) toggle(scored[0].item.id, document.querySelector('.toggle-btn'));
}

function toggle(id, btn) {
  const body  = document.getElementById('body-' + id);
  const arrow = document.getElementById('arrow-' + id);
  const open  = body.classList.toggle('open');
  arrow.classList.toggle('open', open);
  btn.childNodes[0].textContent = open ? 'Ocultar detalle ' : 'Ver detalle ';
}

document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); buscar(); }
});
